worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Extended access log: adds which upstream served the request, the status
    # that upstream returned, and upstream/request timing. Makes it possible
    # to correlate a 502 with a specific replica.
    log_format upstreamlog '$remote_addr - - [$time_local] "$request" $status $body_bytes_sent '
                           'upstream=$upstream_addr u_status=$upstream_status '
                           'u_rt=$upstream_response_time rt=$request_time';
    access_log /dev/stdout upstreamlog;
    error_log  /dev/stderr warn;

    upstream mono_app {
        least_conn;
        server app:3000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://mono_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location /health {
            proxy_pass http://mono_app/health;
        }
    }
}
