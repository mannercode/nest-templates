name: CI
on:
    pull_request:
        branches: ['main']
    push:
        branches: ['main']
    schedule:
        # Every 6 hours at :17 UTC so main gets a periodic green run even
        # without commits, catching dependency/infra-driven breakage.
        - cron: '17 */6 * * *'
permissions:
    contents: read
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    ci:
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@v5
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      npm run atoz
