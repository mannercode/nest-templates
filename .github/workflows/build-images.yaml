name: Build Images
on:
    push:
        branches: ['main']
    pull_request:
        branches: ['main']
    workflow_dispatch:
permissions:
    contents: read
    packages: write
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    build:
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: mono
                      dockerfile: apis/mono/Dockerfile
                      target_app: ''
                    - name: msa-applications
                      dockerfile: apis/msa/Dockerfile
                      target_app: applications
                    - name: msa-cores
                      dockerfile: apis/msa/Dockerfile
                      target_app: cores
                    - name: msa-infrastructures
                      dockerfile: apis/msa/Dockerfile
                      target_app: infrastructures
        steps:
            - uses: actions/checkout@v5
            - uses: docker/setup-buildx-action@v3
            - uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/${{ github.repository_owner }}/nest-seed-${{ matrix.name }}
                  tags: |
                      type=sha,format=long
                      type=raw,value=main,enable={{is_default_branch}}
            # Push only on main push/dispatch. PR builds just validate the
            # Dockerfile via buildx and reuse main's buildcache layers.
            - uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ${{ matrix.dockerfile }}
                  platforms: linux/arm64
                  build-args: |
                      TARGET_APP=${{ matrix.target_app }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/nest-seed-${{ matrix.name }}:buildcache
                  cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref=ghcr.io/{0}/nest-seed-{1}:buildcache,mode=max', github.repository_owner, matrix.name) || '' }}
                  push: ${{ github.event_name != 'pull_request' }}
