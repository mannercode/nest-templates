name: Test Stability
on:
    workflow_dispatch:
permissions:
    contents: read
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    unit:
        strategy:
            fail-fast: false
            matrix:
                scope: [libs, apis/mono, apis/msa]
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 360
        steps:
            - uses: actions/checkout@v5
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      npm run build
                      bash .github/scripts/repeat.sh 100 npm test -w ${{ matrix.scope }} --if-present -- --coverageThreshold='{}'
    bootup:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - scope: mono
                      count: 100
                    - scope: msa
                      count: 70
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 360
        steps:
            - uses: actions/checkout@v5
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      npm run build
                      bash .github/scripts/repeat.sh ${{ matrix.count }} bash .github/scripts/bootup-test.sh ${{ matrix.scope }}
    scenario:
        strategy:
            fail-fast: false
            matrix:
                scenario:
                    - sse
                    - customer-race
                    - ticket-holding-race
                    - showtime-overlap-race
                    - purchase-double-spend
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 360
        steps:
            - uses: actions/checkout@v5
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      bash .github/scripts/repeat.sh 60 bash apis/mono/tests/runner.sh ${{ matrix.scenario }}
