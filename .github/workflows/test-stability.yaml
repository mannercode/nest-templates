name: Test Stability
on:
    workflow_dispatch:
permissions:
    contents: read
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    unit-libs:
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 360
        steps:
            - uses: actions/checkout@v5
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      docker rm -f $(docker ps -aq) 2>/dev/null || true
                      npm run build
                      bash .github/scripts/repeat.sh 100 npm run test:unit -w libs --if-present -- --coverageThreshold='{}'
    unit-mono:
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 360
        steps:
            - uses: actions/checkout@v5
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      npm run build
                      bash .github/scripts/repeat.sh 100 npm run test:unit -w apis/mono -- --coverageThreshold='{}'
